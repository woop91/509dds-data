name: Refresh SSA datasets

# Two jobs with different cadences:
#   refresh-annual  — Nov 15 each year: SSA-SA-FYWL + DDS-Net-Accuracy (published ~Oct/Nov)
#   refresh-monthly — 15th of every month: CDP-Time-Monthly (updated each month by SSA)
#
# Both jobs can also be triggered manually via workflow_dispatch.
#
# If SSA's CDN blocks GitHub Actions runner IPs (Azure egress), the job will fail and
# an error artifact is saved for debugging. Add FIRECRAWL_API_KEY to repo secrets and
# switch the curl step to firecrawl if that happens.

on:
  schedule:
    # Annual: 15:00 UTC on November 15
    - cron: '0 15 15 11 *'
    # Monthly: 15:00 UTC on the 15th of every month
    - cron: '0 15 15 * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual refresh (optional)'
        required: false
        default: 'manual refresh'

permissions:
  contents: write

jobs:
  refresh-annual:
    name: Annual SSA datasets (Nov 15)
    # Run on the November schedule or on manual dispatch; skip other months
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 15 15 11'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch annual SSA CSVs
        env:
          UA: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
        run: |
          set -e
          mkdir -p data/ssa
          declare -a urls=(
            "https://www.ssa.gov/disability/data/SSA-SA-FYWL.csv|data/ssa/ssa-sa-fywl-all-states.csv"
            "https://www.ssa.gov/data/DDS-Net-Accuracy.csv|data/ssa/dds-net-accuracy-by-state.csv"
          )
          for entry in "${urls[@]}"; do
            url="${entry%%|*}"
            dest="${entry##*|}"
            tmp="$(mktemp)"
            echo "Fetching $url"
            http_code=$(curl -sL -A "$UA" -w "%{http_code}" -o "$tmp" --max-time 90 "$url" || echo "000")
            if [ "$http_code" != "200" ]; then
              echo "::warning::HTTP $http_code for $url — skipping"
              continue
            fi
            if head -1 "$tmp" | grep -qiE '<html|<!doctype'; then
              echo "::warning::Got HTML response for $url (likely bot-block); skipping"
              cp "$tmp" "${dest}.error.html"
              continue
            fi
            mv "$tmp" "$dest"
            echo "Saved $dest ($(wc -c < "$dest") bytes)"
          done

      - name: Commit if changed
        run: |
          set -e
          if [ -z "$(git status --porcelain data/ssa/ssa-sa-fywl-all-states.csv data/ssa/dds-net-accuracy-by-state.csv)" ]; then
            echo "No changes — annual SSA datasets unchanged."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ssa/ssa-sa-fywl-all-states.csv data/ssa/dds-net-accuracy-by-state.csv
          git commit -m "data: refresh annual SSA datasets (auto, $(date -u +%Y-%m-%d))"
          git push

      - name: Upload error artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssa-annual-fetch-errors
          path: data/ssa/*.error.html
          if-no-files-found: ignore
          retention-days: 30

  refresh-monthly:
    name: Monthly CDP processing-time dataset
    # Run every month (both schedules trigger on the 15th, so filter out November
    # for the monthly job to avoid double-committing — annual job handles that month)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch CDP-Time-Monthly CSV
        env:
          UA: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
        run: |
          set -e
          mkdir -p data/ssa
          url="https://www.ssa.gov/data/fy16-onwards-CDP-Time-Monthly.csv"
          dest="data/ssa/cdp-time-monthly.csv"
          tmp="$(mktemp)"
          echo "Fetching $url"
          http_code=$(curl -sL -A "$UA" -w "%{http_code}" -o "$tmp" --max-time 90 "$url" || echo "000")
          if [ "$http_code" != "200" ]; then
            echo "::warning::HTTP $http_code for $url — skipping"
            exit 0
          fi
          if head -1 "$tmp" | grep -qiE '<html|<!doctype'; then
            echo "::warning::Got HTML response for $url (likely bot-block); skipping"
            cp "$tmp" "${dest}.error.html"
            exit 0
          fi
          mv "$tmp" "$dest"
          echo "Saved $dest ($(wc -c < "$dest") bytes)"

      - name: Commit if changed
        run: |
          set -e
          if [ -z "$(git status --porcelain data/ssa/cdp-time-monthly.csv)" ]; then
            echo "No changes — CDP-Time-Monthly unchanged from last run."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/ssa/cdp-time-monthly.csv
          git commit -m "data: refresh CDP processing-time dataset (auto, $(date -u +%Y-%m-%d))"
          git push

      - name: Upload error artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssa-monthly-fetch-errors
          path: data/ssa/*.error.html
          if-no-files-found: ignore
          retention-days: 30
